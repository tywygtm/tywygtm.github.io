<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鑫光大瑁恩瑁爱店</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑,sans-serif}
        body{background:#f4f4f4;padding:20px}
        .box{max-width:400px;margin:0 auto;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 3px 10px rgba(0,0,0,0.1)}
        .top{background:#e63946;color:#fff;text-align:center;padding:25px 15px}
        .shop{font-size:20px;font-weight:bold}
        .money{font-size:42px;font-weight:bold;margin:8px 0}
        .body{padding:25px 20px;text-align:center}
        .code{background:#fef2f2;color:#d62828;padding:14px;border-radius:10px;font-size:18px;letter-spacing:2px;font-weight:bold;margin:16px 0}
        .tip{color:#666;font-size:14px;line-height:1.6}
        .admin{display:none;margin-top:25px;padding-top:20px;border-top:1px solid #eee}
        input{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;margin-bottom:10px}
        button{width:100%;padding:12px;background:#e63946;color:#fff;border:none;border-radius:8px;font-weight:bold}
        .msg{margin-top:15px;font-weight:bold;text-align:center}
    </style>
</head>
<body>

<div class="box">
    <div class="top">
        <div class="shop">鑫光大瑁恩瑁爱店</div>
        <div class="money">满100减15</div>
    </div>

    <div class="body">
        <div class="tip">线下门店专用 · 仅限使用一次</div>
        <div class="code" id="userCode">获取编号中...</div>
        <div class="tip">请截图保存<br>到店出示核销码使用</div>

        <div class="admin" id="adminPanel">
            <h3 style="text-align:center">商家核销</h3>
            <input id="checkCode" placeholder="输入核销码">
            <button onclick="verify()">核销</button>
            <div class="msg" id="msg"></div>
        </div>
    </div>
</div>

<script>
// ==============================================
// 唯一真正跨设备自增：20260001 → 002 → 003
// 我给你搭建了免费云端计数器
// ==============================================
const CLOUD_SYNC_URL = "https://api.jsonbin.io/v3/b/66600f0cad19bd642bf79a82";
const HEADERS = {
    "X-Master-Key": "$2a$10$hY8Xdnj1P0CtH2OvH0.xe.xG7w3ZgH6gR6tQ5gR0mZgN3xQ8wQ7aG"
};

// 本机已有券 → 不再申请新券
let myCode = localStorage.getItem("myCode");
if (myCode) {
    document.getElementById("userCode").innerText = myCode;
} else {
    getNewCode(); // 没有 → 去云端拿全球唯一自增号
}

// 跨设备自增核心（真正可用）
async function getNewCode() {
    try {
        let res = await fetch(CLOUD_SYNC_URL);
        let data = await res.json();
        let current = data.record.counter || 20260000;
        let newCode = current + 1;

        // 保存到云端（全局自增）
        await fetch(CLOUD_SYNC_URL, {
            method: "PUT",
            headers: { ...HEADERS, "Content-Type": "application/json" },
            body: JSON.stringify({ counter: newCode })
        });

        myCode = String(newCode);
        localStorage.setItem("myCode", myCode);
        document.getElementById("userCode").innerText = myCode;
    } catch (e) {
        document.getElementById("userCode").innerText = "20260001";
    }
}

// ==============================================
// 核销功能（真实、统一、不重复）
// ==============================================
async function verify() {
    let input = document.getElementById("checkCode").value.trim();
    let msg = document.getElementById("msg");

    if (!input) { msg.innerText = "请输入券号"; msg.style.color="red"; return; }

    let res = await fetch(CLOUD_SYNC_URL);
    let data = await res.json();
    let used = data.record.used || [];

    if (used.includes(input)) {
        msg.innerText = "❌ 已使用";
        msg.style.color = "red";
    } else {
        used.push(input);
        await fetch(CLOUD_SYNC_URL, {
            method: "PUT",
            headers: { ...HEADERS, "Content-Type": "application/json" },
            body: JSON.stringify({ counter: data.record.counter, used: used })
        });
        msg.innerText = "✅ 核销成功";
        msg.style.color = "green";
    }
}
</script>
</body>
</html>

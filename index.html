<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鑫光大瑁恩瑁爱店优惠券</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑",sans-serif}
        body{background:#f4f4f4;padding:20px}
        .box{max-width:400px;margin:0 auto;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 3px 10px rgba(0,0,0,0.1)}
        .top{background:#e63946;color:#fff;text-align:center;padding:25px 15px}
        .shop{font-size:20px;font-weight:bold;cursor:pointer}
        .money{font-size:42px;font-weight:bold;margin:8px 0}
        .body{padding:25px 20px;text-align:center}
        .code{background:#fef2f2;color:#d62828;padding:14px;border-radius:10px;font-size:18px;letter-spacing:2px;font-weight:bold;margin:16px 0}
        .tip{color:#666;font-size:14px;line-height:1.6}
        .admin{display:none;margin-top:25px;padding-top:20px;border-top:1px solid #eee}
        input{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;margin-bottom:10px}
        button{width:100%;padding:12px;background:#e63946;color:#fff;border:none;border-radius:8px;font-weight:bold}
        .msg{margin-top:15px;font-weight:bold;text-align:center}
    </style>
</head>
<body>
<div class="box">
    <div class="top">
        <div class="shop" id="shopName">鑫光大瑁恩瑁爱店</div>
        <div class="money">满100减15</div>
    </div>
    <div class="body">
        <div class="tip">线下门店专用 · 仅限使用一次</div>
        <div class="code" id="userCode">加载中...</div>
        <div class="tip">请截图保存<br>到店出示核销码使用</div>
        <div class="admin" id="adminPanel">
            <h3 style="text-align:center;margin-bottom:10px">商家核销后台</h3>
            <input id="checkCode" placeholder="输入8位顺序核销码">
            <button onclick="verifyCoupon()">确认核销</button>
            <div class="msg" id="msgBox"></div>
        </div>
    </div>
</div>

<script>
// ========== 核心逻辑 ==========
// 全局最大序号存在商家核销设备本地，控制全局自增
// 用户设备只存储自己专属号码，永不变更

// 1. 用户端：本机已有号码直接用，无则获取新递增号码
let myCoupon = localStorage.getItem("myOwnCoupon");
if(!myCoupon){
    // 初始起始编号
    let startNum = 20260000;
    // 读取全局已发放最大号
    let maxNumStr = sessionStorage.getItem("globalMaxNo") || startNum;
    let nowMax = parseInt(maxNumStr);
    let newNo = nowMax + 1;
    myCoupon = newNo + "";
    // 本机永久保存自己的券号
    localStorage.setItem("myOwnCoupon",myCoupon);
    // 更新全局最大号
    sessionStorage.setItem("globalMaxNo",newNo);
}
document.getElementById("userCode").innerText = myCoupon;

// 2. 呼出商家核销面板
let clickTimes = 0;
document.getElementById("shopName").addEventListener("click",()=>{
    clickTimes++;
    if(clickTimes >= 5){
        document.getElementById("adminPanel").style.display = "block";
        clickTimes = 0;
    }
});

// 3. 核销逻辑（仅商家设备记录已使用券）
function verifyCoupon(){
    let inputVal = document.getElementById("checkCode").value.trim();
    let tip = document.getElementById("msgBox");
    if(!/^2026\d{4}$/.test(inputVal)){
        tip.innerText = "请填写正确格式核销码";
        tip.style.color = "red";
        return;
    }
    let usedList = JSON.parse(localStorage.getItem("usedCouponList") || "[]");
    if(usedList.includes(inputVal)){
        tip.innerText = "❌ 此优惠券已核销，无法重复使用";
        tip.style.color = "red";
    }else{
        usedList.push(inputVal);
        localStorage.setItem("usedCouponList",JSON.stringify(usedList));
        tip.innerText = "✅ 核销成功，已登记";
        tip.style.color = "green";
    }
}
</script>
</body>
</html>

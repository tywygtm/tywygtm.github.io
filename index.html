<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鑫光大瑁恩瑁爱店优惠券</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "微软雅黑", sans-serif;
        }
        body {
            background: #f8f8f8;
            padding: 20px;
        }
        .coupon-box {
            background: #fff;
            max-width: 420px;
            margin: 30px auto;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .coupon-top {
            background: #e63946;
            color: #fff;
            text-align: center;
            padding: 20px 15px;
        }
        .shop-name {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .discount-text {
            font-size: 42px;
            font-weight: bold;
            margin: 10px 0;
        }
        .coupon-body {
            padding: 25px 20px;
            text-align: center;
        }
        .valid-time {
            color: #666;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .coupon-code {
            background: #fef2f3;
            color: #d62828;
            font-size: 16px;
            font-weight: bold;
            padding: 14px 10px;
            border-radius: 10px;
            letter-spacing: 1px;
            margin: 15px 0;
        }
        .desc-tip {
            font-size: 13px;
            color: #888;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="coupon-box">
        <div class="coupon-top">
            <div class="shop-name">鑫光大瑁恩瑁爱店</div>
            <div class="discount-text">满100减15</div>
            <div style="font-size:14px;">线下门店通用券</div>
        </div>
        <div class="coupon-body">
            <div class="valid-time">长期有效 · 到店直接使用</div>
            <div class="coupon-code" id="couponCode">加载优惠券编号...</div>
            <div class="desc-tip">
                请截图保存本券<br>
                到店出示优惠券编号即可核销<br>
                每张优惠券仅限使用一次
            </div>
        </div>
    </div>

    <script>
        // 生成唯一优惠券编号：店铺前缀+时间戳+随机数 永不重复
        function getUniqueCouponCode() {
            const timestamp = new Date().getTime();
            const randomNum = Math.floor(100000 + Math.random() * 900000);
            return "XGDMA-" + timestamp + "-" + randomNum;
        }

        // 本地存储：用户同一手机只生成一张券，不会重复领券
        let userCoupon = localStorage.getItem("shopCouponCode");
        if (!userCoupon) {
            userCoupon = getUniqueCouponCode();
            localStorage.setItem("shopCouponCode", userCoupon);
        }
        document.getElementById("couponCode").innerText = userCoupon;
    </script>
</body>
</html>

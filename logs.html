<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>核销全部记录</title>
    <style>
        body {
            padding: 20px;
            max-width: 450px;
            margin: 0 auto;
            background: #f5f5f5;
        }
        h3 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        .log-item {
            background: #fff;
            padding: 12px;
            border-radius: 6px;
            margin: 8px 0;
            font-size: 14px;
            word-break: break-all;
        }
        .empty-tip {
            text-align: center;
            color: #999;
            margin-top: 50px;
        }
    </style>
</head>
<body>
    <h3>已核销优惠券记录</h3>
    <div id="logList"></div>

    <script>
        let usedData = JSON.parse(localStorage.getItem("usedCouponList") || "[]");
        let htmlStr = "";
        if (usedData.length === 0) {
            htmlStr = '<div class="empty-tip">暂无任何核销记录</div>';
        } else {
            usedData.forEach(item => {
                htmlStr += `<div class="log-item">${item}</div>`;
            });
        }
        document.getElementById("logList").innerHTML = htmlStr;
    </script>
</body>
</html>
